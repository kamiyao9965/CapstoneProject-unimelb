vertical: private_health
version: 0.1-draft
description: Reusable schema for extracting Australian private health insurance product information from hospital, extras, general health, and combined cover PDFs. Designed to capture stable cross-company details such as product identity, fund, product type, hospital tier, hospital treatment category status, extras benefits, waiting periods, limits, excesses, co-payments, ambulance cover, exclusions, conditions, and source evidence.
product_types:
  - hospital
  - extras
  - generalhealth
  - combined
fields:
  - name: product_name
    type: string
    description: Marketing or formal name of the cover or policy, such as a hospital cover, extras cover, or combined package.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: fund_name
    type: string
    description: Name of the private health insurer, fund, or brand shown on the document.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: legal_entity_name
    type: string
    description: Registered legal entity, ABN holder, or underwriting company where stated separately from the trading brand.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: abn
    type: string
    description: Australian Business Number for the fund or legal entity where shown.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: product_type
    type: enum
    description: Broad cover type represented by the document.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values:
      - hospital
      - extras
      - generalhealth
      - combined
  - name: product_tier
    type: string
    description: Product tier or level as marketed by the fund, including government hospital tiers such as Basic Plus or extras levels such as Value Extras or High Extras.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: hospital_tier
    type: enum
    description: Australian Government hospital cover tier where applicable.
    applies_to:
      - hospital
      - combined
    required: false
    values:
      - Basic
      - BasicPlus
      - Bronze
      - BronzePlus
      - Silver
      - SilverPlus
      - Gold
      - GoldPlus
      - Unknown
  - name: effective_date
    type: string
    description: Date from which the product sheet, guide, benefits, or cover summary is effective. Store as ISO date where possible.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: information_current_date
    type: string
    description: Date the information is stated to be current or correct at, if different from the effective date.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: document_title
    type: string
    description: Title of the source document, brochure, product sheet, product guide, or cover summary.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: source_references
    type: list[object]
    description: Evidence references supporting extracted values. Suggested object keys are source_file, page, section_heading, table_heading, field_name, raw_text, and confidence.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: product_url
    type: string
    description: Product-specific web address or page referenced for full details, provider search, hospitals, fund rules, or updated information.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: contact_details
    type: list[object]
    description: Contact information shown in the document. Suggested object keys are type, label, value, availability, and notes.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: product_description
    type: string
    description: Short narrative description of the cover, including positioning such as low cost, entry-level, affordable extras, high extras, or combined hospital and extras package.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: eligibility_restrictions
    type: string
    description: Membership eligibility or restricted fund criteria, where stated, such as employment, industry, defence community, union, or family eligibility.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: not_for_profit_status
    type: boolean
    description: Whether the document states the fund is not-for-profit, member-owned, or part of a not-for-profit alliance.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: hospital_treatment_categories
    type: list[object]
    description: Hospital treatment category coverage. Suggested object keys are canonical_category, original_label, coverage_status, status_raw, setting, benefit_basis, conditions, footnotes, and source_references.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: hospital_category_coverage_status
    type: enum
    description: Normalised coverage status for each hospital treatment category.
    applies_to:
      - hospital
      - combined
    required: false
    values:
      - included
      - restricted
      - excluded
      - not_applicable
      - unknown
  - name: hospital_private_facility_benefits
    type: list[object]
    description: Benefits and conditions for private or agreement hospital admissions. Suggested object keys are facility_type, room_type, accommodation_cover, theatre_fees, intensive_care_fees, labour_ward_fees, same_day_surgery, agreement_hospital_required, excess_applies, and notes.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: hospital_public_facility_benefits
    type: list[object]
    description: Benefits and conditions for public hospital admissions as a private patient. Suggested object keys are room_type, accommodation_cover, theatre_fees, intensive_care_fees, labour_ward_fees, restricted_default_benefit_applies, excess_applies, and notes.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: agreement_hospital_network
    type: string
    description: Description of agreement hospital, Member Plus hospital, network hospital, or contracted private hospital arrangements and how they affect out-of-pocket costs.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: doctor_choice
    type: boolean
    description: Whether the cover states that members may choose their doctor or specialist for admitted hospital treatment.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: medical_gap_scheme
    type: string
    description: Medical gap arrangement or billing scheme referenced by the fund, such as Access Gap Cover or fund-specific doctor agreements.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: medical_gap_conditions
    type: string
    description: Conditions explaining when doctor, specialist, anaesthetist, MBS, or gap costs may apply.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: medical_devices_and_prostheses
    type: string
    description: Rules for surgically implanted prostheses, government-prescribed medical devices, human tissue products, or prostheses list benefits, including possible out-of-pocket expenses.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: hospital_excess_options
    type: list[object]
    description: Hospital excess options and rules. Suggested object keys are amount, currency, frequency, per_member_limit, policy_limit, applies_to_day_admissions, applies_to_overnight_admissions, child_dependant_exemption, lower_excess_waiting_period, and notes.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: hospital_copayments
    type: list[object]
    description: Hospital co-payments or episode payments. Suggested object keys are amount, currency, service, episode_basis, frequency, hospital_agreement_dependency, and notes.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: ambulance_cover
    type: list[object]
    description: Ambulance benefits. Suggested object keys are ambulance_type, emergency_status, transport_modes, provider_requirement, benefit_amount, benefit_percent, annual_limit, waiting_period, geographic_scope, exclusions, state_scheme_notes, and source_references.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: accident_cover
    type: list[object]
    description: Accident cover rules and benefits. Suggested object keys are included, waiting_period, accident_definition, must_occur_after_joining, country_requirement, practitioner_visit_deadline_days, admission_deadline_days, ongoing_treatment_window_days, exclusions, and notes.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: waiting_periods
    type: list[object]
    description: Waiting periods by service, category, or benefit. Suggested object keys are service_or_category, canonical_service, canonical_hospital_category, waiting_period_value, waiting_period_unit, applies_when, waived_conditions, and source_references.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: pre_existing_condition_rule
    type: string
    description: Fund wording for pre-existing ailment or condition rules, including six-month symptom look-back period, medical practitioner assessment, and 12-month waiting period where applicable.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: restricted_service_rule
    type: string
    description: Explanation of restricted hospital benefits, including default public hospital shared-room benefit and likely out-of-pocket costs in private hospitals.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: hospital_exclusions
    type: list[object]
    description: Hospital benefit exclusions. Suggested object keys are exclusion_type, description, applies_to, examples, and source_references.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: hospital_out_of_pocket_conditions
    type: list[object]
    description: Situations where members may incur out-of-pocket costs. Suggested object keys are cost_type, trigger, mitigation, affected_services, and notes.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: in_hospital_pharmacy
    type: string
    description: Rules for admitted in-hospital pharmacy, PBS or non-PBS items, episode limits, hospital agreement dependency, and co-payments.
    applies_to:
      - hospital
      - combined
    required: false
    values: []
  - name: extras_services
    type: list[object]
    description: Extras/general health services and benefits. Suggested object keys are canonical_service, original_label, service_group, item_codes, benefit_type, benefit_amount, benefit_percent, benefit_cap, annual_limit, lifetime_limit, sublimit, frequency_limit, waiting_period, network_requirement, provider_requirement, conditions, exclusions, and source_references.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: extras_benefit_type
    type: enum
    description: Normalised benefit calculation method for extras services.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values:
      - fixed_amount
      - up_to_amount
      - percentage
      - percent_up_to_amount
      - full_cost
      - no_gap
      - unlimited
      - unknown
  - name: extras_limit_period
    type: enum
    description: Period over which extras limits reset.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values:
      - calendar_year
      - financial_year
      - rolling_period
      - lifetime
      - per_episode
      - per_service
      - unknown
  - name: extras_limits
    type: list[object]
    description: Limits applying to extras services. Suggested object keys are canonical_service, limit_amount, currency, limit_scope, period, family_limit_amount, child_limit_amount, lifetime_limit_amount, sublimit_amount, frequency_limit, reset_date, and notes.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: extras_waiting_periods
    type: list[object]
    description: Extras waiting periods by service group or individual service.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: extras_networks
    type: list[object]
    description: Provider networks or preferred provider arrangements, such as dental networks, optical networks, no-gap dental, no-gap glasses, or percentage discounts. Suggested object keys are network_name, service_type, benefit_description, no_gap_available, discount_description, conditions, and url.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: recognised_provider_requirements
    type: string
    description: Requirements for extras providers to be registered, recognised, in private practice, Australian-based, hold professional body registration, or be accepted by the fund.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: extras_claiming_conditions
    type: list[object]
    description: Claim rules for extras. Suggested object keys are condition_type, description, applies_to_service, time_limit, country_requirement, medicare_exclusion, third_party_exclusion, provider_requirement, and notes.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: extras_exclusions
    type: list[object]
    description: Extras exclusions such as Medicare-payable services, overseas goods or services, family member providers, old claims, unrecognised providers, non-prescription items, over-the-counter medicines, compensation, or services not charged.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: pharmacy_rules
    type: string
    description: Rules for pharmacy, non-PBS prescriptions, PBS gap calculation, TGA approval, vaccinations, contraceptives, over-the-counter exclusions, vitamins, supplements, minerals, nicotine products, and prescription requirements.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: health_management_program_rules
    type: string
    description: Rules for health management, healthy lifestyle, preventative health, screening tests, weight management, gym or condition-management programs, declarations, and Medicare exclusions.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: school_accident_benefit
    type: string
    description: School accident extras benefit details where offered, including dependant eligibility, no waiting period, annual limit, and requirement to claim relevant extras benefits first.
    applies_to:
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: transfer_policy
    type: string
    description: Rules for transferring from another health fund, including time windows such as 30 or 60 days, recognition of served waiting periods, upgrades, higher benefits, and remaining waiting periods.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: claims_lodgement_methods
    type: list[object]
    description: Ways to claim benefits, such as card swipe, app, online portal, email, fax, post, or member service portal. Suggested object keys are method, channel, address_or_url, supported_services, and notes.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: claim_lodgement_time_limit
    type: string
    description: Maximum time after service by which claims must be lodged, where stated.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: cooling_off_period
    type: string
    description: Cooling-off or change-of-mind period and refund conditions, where stated.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
  - name: governing_documents
    type: list[object]
    description: Related governing documents referenced by the product sheet, such as Membership Guide, Fund Rules, Privacy Policy, PHIS, or Private Health Insurance Code of Conduct. Suggested object keys are document_name, url, and relevance.
    applies_to:
      - hospital
      - extras
      - generalhealth
      - combined
    required: false
    values: []
hospital_categories:
  - canonical_name: BackNeckSpine
    description: Hospital treatment for the investigation and treatment of the back, neck and spinal column.
    aliases:
      - Back, neck and spine
      - Back neck and spine
  - canonical_name: Blood
    description: Hospital treatment for blood-related disorders and treatments.
    aliases:
      - Blood
  - canonical_name: BoneJointAndMuscle
    description: Hospital treatment for bones, joints, muscles, tendons, ligaments and soft tissue, excluding more specific joint replacement or reconstruction categories where separately listed.
    aliases:
      - Bone, joint and muscle
      - Bone joint and muscle
  - canonical_name: BrainAndNervousSystem
    description: Hospital treatment for the brain, spinal cord and nervous system.
    aliases:
      - Brain and nervous system
  - canonical_name: BreastSurgeryMedicallyNecessary
    description: Medically necessary hospital treatment for breast surgery.
    aliases:
