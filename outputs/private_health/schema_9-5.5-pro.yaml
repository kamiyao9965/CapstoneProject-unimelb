notes:
  - Use hospital_categories as the canonical vocabulary for Australian hospital treatment category rows; preserve the raw PDF wording in source_alias.
  - Use extras_services for extras and generalhealth documents, because many generalhealth PDFs use extras-style benefit tables for therapies, pharmacy, optical, dental, health management and devices.
  - Store both category-level and item-level extras data where available; dental item numbers should be strings to preserve leading zeros.
  - Always capture benefit basis separately from limits: examples include fixed dollar amounts, up-to amounts, percentages, no-gap, PBS-gap and full-cost/unlimited wording.
  - Capture limit scope and period explicitly; the supplied PDFs use calendar-year limits, financial-year limits, family limits, per-child limits, per-eye limits, lifetime limits and replacement periods.
  - For hospital rows, normalize check marks to included, R/restricted labels to restricted, and crosses to excluded while retaining the raw symbol or text.
  - Do not infer premiums, prices or product availability unless explicitly printed in the source document.
  - Every extracted value should be traceable through source_references with page number and quote or table context.
