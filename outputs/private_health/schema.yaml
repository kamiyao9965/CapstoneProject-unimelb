notes:
  - This schema models hospital clinical categories using the government-standard list; PDFs consistently present these with statuses Included, Restricted, Excluded.
  - Hospital “Restricted” is captured both as a status on categories and explained in restricted_services_definition; PDFs describe it as default/shared-room public equivalent with significant out-of-pocket costs at private hospitals.
  - Ambulance benefits appear under both hospital and extras/general health; schema provides a unified ambulance_cover object with state handling (QLD/TAS schemes; NSW/ACT levy flow).
  - Extras benefits vary between fixed dollar per consult, percentage reimbursement to a cap, and no-gap network pricing. The extras_benefits object captures all patterns, incl. provider networks (e.g., smile.com.au dental, optical networks) and frequency rules via sublimits_and_frequencies.
  - Waiting periods: hospital_waiting_periods includes 12 months for pre-existing conditions; 2 months for Hospital psychiatric/Rehabilitation/Palliative in multiple brochures; 1–7 days for ambulance/accident where stated; extras_waiting_periods supports per-service values (e.g., 12 months Major Dental/Orthodontics; 6 months Optical/Healthy Lifestyle; 2 months most others; 1 day Ambulance in some combined products).
  - Limits reset: some brochures use calendar year (e.g., NMH), others financial year (e.g., Defence Health; Peoplecare). extras_limit_reset_period captures this.
  - Evidence fields are included at both product and row levels to cite page/file path (e.g., NMH StarterPak pp.3–4, Defence Health Value Extras pp.1–2, Peoplecare High Extras p.2, HBF Basic Hospital Plus pp.2–5).
  - Appliances/devices sub‑limits and replacement cycles are normalised via medical_devices_appliances and replacement_cycle_years (e.g., hearing aids every 5 years; orthotics every 2 years; 3‑year appliance replacement rules).
  - Dental network “no‑gap” arrangements and optical no‑gap ranges can be captured using extras_benefits.provider_network with benefit_type=no_gap and relevant frequency notes.
