vertical: private_health
version: 0.1-draft
description: Canonical extraction schema for Australian private health insurance product documents. Designed to normalise Hospital, Extras (General Treatment), General Health and Combined products across funds. Prioritises portable cross-company fields, standard clinical categories, common extras services, waiting periods, limits, benefits, member cost-sharing, conditions and evidence references.
product_types:
  - hospital
  - extras
  - general_health
  - combined
fields:
  - name: product_name
    type: string
    description: Published product name as shown on the document.
    applies_to: [hospital, extras, general_health, combined]
    required: true
    values: []
  - name: fund_name
    type: string
    description: Health fund/company or trading brand publishing the document.
    applies_to: [hospital, extras, general_health, combined]
    required: true
    values: []
  - name: brand_name
    type: string
    description: Sub-brand or restricted membership brand where different from fund_name (e.g., Nurses & Midwives Health).
    applies_to: [hospital, extras, combined]
    required: false
    values: []
  - name: product_type
    type: enum
    description: Normalised product type.
    applies_to: [hospital, extras, general_health, combined]
    required: true
    values: [hospital, extras, general_health, combined]
  - name: tier
    type: enum
    description: Government PHI hospital tier where applicable.
    applies_to: [hospital, combined]
    required: false
    values: [Basic, Bronze, Silver, Gold, BasicPlus, BronzePlus, SilverPlus, GoldPlus, NotApplicable]
  - name: effective_date
    type: string
    description: Effective date printed on the document (ISO-8601 if possible).
    applies_to: [hospital, extras, general_health, combined]
    required: false
    values: []
  - name: cover_summary
    type: string
    description: Short free-text summary of inclusions the fund states (e.g., “entry-level hospital with no excess”).
    applies_to: [hospital, extras, combined]
    required: false
    values: []
  - name: accident_cover
    type: list[object]
    description: Normalised accident cover rules for hospital or extras ambulance where described. Each object may include fields type(hospital|ambulance), waiting_period_days, eligibility_window_days, provider_requirements, scope_of_cover, exclusions, notes.
    applies_to: [hospital, combined, extras, general_health]
    required: false
    values: []
  - name: ambulance_cover
    type: list[object]
    description: Ambulance benefits. Each object may include fields scope(emergency|urgent|non_emergency|treatment_only|inter_hospital), mode(road|air|sea), waiting_period_days, network/state_rules, per_person_limit_amount, per_family_limit_amount, period_type, copayment_amount, notes.
    applies_to: [hospital, extras, combined, general_health]
    required: false
    values: []
  - name: excess_options
    type: list[object]
    description: Hospital excess choices. Each object may include fields amount, applies_to(adult|per_member|per_admission|per_calendar_year), child_excess_applicable(boolean), wait_for_lower_excess_months, notes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: copayment
    type: list[object]
    description: Hospital co-pay amounts (per day or episode). Object may include fields amount, unit(per_day|per_episode), max_days, applies_to, notes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: medical_gap_scheme
    type: list[object]
    description: Gap scheme(s) available for inpatient services (e.g., Access Gap Cover/No Gap). Include scheme_name, scope(inpatient_outpatient), provider_search_url, notes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: agreement_hospitals
    type: list[object]
    description: Statements or requirements about contracted/agreement hospitals. Object may include fields network_name, requirement_text, search_url, notes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_category_coverages
    type: list[object]
    description: Coverage per clinical category. Each object includes category_canonical_name, coverage(included|restricted|excluded|unknown), notes/conditions.
    applies_to: [hospital, combined]
    required: true
    values: []
  - name: hospital_waiting_periods
    type: list[object]
    description: Waiting periods for hospital services. Each object may include fields scope(all_services|pre_existing|psychiatric|rehabilitation|palliative|accident|ambulance|other), duration_days, duration_months, notes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: prostheses_coverage
    type: string
    description: Statement about prostheses covered only to government list/benefit and any member out-of-pocket risks.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: in_hospital_pharmacy
    type: list[object]
    description: Non-PBS in-hospital pharmacy rules and caps. Object may include fields per_episode_cap_amount, member_copayment_amount, agreement_dependent(boolean), notes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: extras_benefits
    type: list[object]
    description: Normalised extras service benefits. Each object may include fields service_canonical_name, coverage_status(covered|not_covered|network_only), benefit_percent, benefit_amount, per_item_cap_amount, notes.
    applies_to: [extras, general_health, combined]
    required: false
    values: []
  - name: extras_limits
    type: list[object]
    description: Annual and lifetime limits. Object may include fields service_canonical_name, limit_amount, limit_unit(AUD|services|visits), period_type(calendar_year|financial_year|membership_year|rolling|per_n_years), per(person|family|policy), sublimits(list), lifetime_limit_amount, frequency_rules(list), notes.
    applies_to: [extras, general_health, combined]
    required: false
    values: []
  - name: extras_waiting_periods
    type: list[object]
    description: Waiting periods per extras grouping. Object may include fields service_canonical_name_or_group, duration_months, duration_days, notes.
    applies_to: [extras, general_health, combined]
    required: false
    values: []
  - name: provider_networks
    type: list[object]
    description: Networks referenced for no-gap or discounted services (e.g., dental or optical networks). Object may include fields network_type(dental|optical|ambulance|hospital), network_name, benefit_variation(no_gap|discount|higher_benefit), conditions, url.
    applies_to: [extras, general_health, hospital, combined]
    required: false
    values: []
  - name: claiming_rules
    type: list[object]
    description: Common claiming conditions. Object may include fields rule_type(frequency|provider_recognition|per_day_limit|receipt_age|other), rule_text, examples.
    applies_to: [extras, general_health, combined, hospital]
    required: false
    values: []
  - name: exclusions_summary
    type: string
    description: Key “we won’t pay for” statements from the document.
    applies_to: [hospital, extras, general_health, combined]
    required: false
    values: []
  - name: benefit_period_type
    type: enum
    description: The period the limits reset on as stated (calendar year or financial year most often).
    applies_to: [extras, general_health, combined]
    required: false
    values: [calendar_year, financial_year, membership_year, other]
  - name: eligibility_restrictions
    type: string
    description: Membership eligibility or restricted membership notes where stated.
    applies_to: [hospital, extras, combined, general_health]
    required: false
    values: []
  - name: reference_codes
    type: list[object]
    description: Item numbers or codes shown (e.g., ADA dental item codes, MBS references). Object may include fields scheme(ADA|MBS|other), code, description, linked_service.
    applies_to: [extras, hospital, combined, general_health]
    required: false
    values: []
  - name: evidence
    type: list[object]
    description: Source references for extracted facts. Each object may include fields fund_name, doc_title, doc_id_or_filename, effective_date, url, page_numbers, snippet(optional).
    applies_to: [hospital, extras, general_health, combined]
    required: false
    values: []
