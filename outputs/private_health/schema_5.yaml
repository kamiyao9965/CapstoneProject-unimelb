notes: |
  Use service_category as the broad table or section heading and service_canonical for cross-company normalization.
  Capture coverage at both product level and service-row level when present, especially for hospital tables with mixed covered/restricted/excluded rows.
  Hospital products often mix included, restricted, and excluded categories; treat these as row-level statuses rather than forcing a single product-wide status.
  For hospital documents, restricted services commonly map to minimum default benefit/shared room/public hospital equivalents, and this should be preserved in benefit_description or conditions_summary.
  Waiting periods are commonly service-specific and can differ for accident, ambulance, pre-existing conditions, psychiatric, rehabilitation, palliative care, optical, dental, pharmacy, and other extras categories.
  Many PDFs distinguish per person vs per family limits, calendar year vs financial year, lifetime limits, and frequency limits; store the raw phrasing in annual_limit_text, lifetime_limit_text if modeled downstream, and frequency_limit_text.
  Some products show percentage benefits with dollar caps or “up to” amounts; prefer benefit_amount_text when the wording is not a simple numeric value.
  Hospital excess may be annual/calendar-year based and may vary by policy type; preserve exact wording and whether it applies per member or per policy.
  Capture provider/network constructs such as agreement hospital, Member Plus hospital, smile.com.au network, recognised provider, and approved practitioner as provider_requirement or in conditions_summary.
  Capture claim channels such as provider terminal swipe, app, online portal, email, fax, post, and claim forms when present.
  Include evidence/source references using page numbers plus concise snippets for each important field or service mapping; prefer the most direct table or section heading that supports the extraction.
  Canonical hospital categories observed across the supplied PDFs include restricted/basic-level services such as BackNeckSpine, and mixed included/restricted classifications for categories like HerniaAndAppendix, Rehabilitation, and HospitalPsychiatricServices.
  Common extras service aliases observed include general dental, major dental, optical network, physio/exercise physiology, chiropractic/osteopathy, complementary therapies, health management programs, pharmacy and vaccinations, medically prescribed devices and appliances, and hearing aids.
  Where documents mention “no-gap”, “100% back”, “up to”, or “discounts”, treat these as benefit conditions rather than separate service categories unless they are clearly network-branded benefits.
  For combined products, capture both hospital and extras sections under one product record structure, with row-level services in each domain.
