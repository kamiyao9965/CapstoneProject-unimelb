vertical: private_health
version: 0.1-draft
description: >
  Normalised schema for Australian private health insurance product documents across hospital, extras/general treatment and
  combined covers. Designed to extract comparable fields such as tier, service-level coverage (included/restricted/excluded),
  waiting periods, limits, excess/co-payments, benefit amounts, ambulance and accident rules, provider/network conditions,
  and evidence references. Informed by PDFs from Nurses & Midwives Health (StarterPak Basic Plus – combined), Defence Health
  (Value Extras), Peoplecare/LHM (High Extras), and HBF (Basic Hospital Plus – hospital).
product_types:
  - hospital
  - extras
  - generalhealth
  - combined
fields:
  - name: product_name
    type: string
    description: Marketing name of the cover as printed (e.g., "StarterPak (Basic Plus)", "Value Extras", "Basic Hospital Plus").
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: fund_name
    type: string
    description: Health fund/company brand (e.g., "Nurses & Midwives Health", "Defence Health", "Peoplecare", "HBF").
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: product_type
    type: enum
    description: Product vertical as sold.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: [hospital, extras, generalhealth, combined]
  - name: government_tier
    type: enum
    description: Government-defined hospital tier, including Plus variants.
    applies_to: [hospital, combined]
    required: false
    values: [Basic, Basic Plus, Bronze, Bronze Plus, Silver, Silver Plus, Gold]
  - name: effective_date
    type: string
    description: Effective date or version date stated on the PDF (ISO-8601 preferred).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: document_title
    type: string
    description: Title printed on the PDF (e.g., "Product Sheet", "Product Guide", "Cover Summary").
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: document_code
    type: string
    description: Publisher code or ref (e.g., "NMH-SPPS-04/25", "DEF0527", "HI-1318").
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: source_url
    type: string
    description: Public URL for the brochure or product page when present.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: evidence
    type: list[object]
    description: Citations to where each extracted element comes from.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values:
      - keys: [field, page, snippet]
  - name: cover_summary
    type: string
    description: Short free-text summary of notable features (e.g., "No excess on admission", "Urgent ambulance by road only").
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: agreement_hospital_network
    type: boolean
    description: Whether product refers to a contracted/agreement hospital network (e.g., "agreement hospitals", "Member Plus hospitals").
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: gap_cover_scheme
    type: string
    description: Name of medical gap scheme referenced (e.g., "Access Gap Cover" / "No-gap arrangements").
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: private_room_cover
    type: boolean
    description: States private room cover when admitted for an included service (often at agreement hospitals).
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_excess_options
    type: list[object]
    description: Available hospital excesses/co-payment options and application rules.
    applies_to: [hospital, combined]
    required: false
    values:
      - keys: [amount, applies_per, max_charges_per_year, applies_to_children, notes]
  - name: hospital_coverage
    type: list[object]
    description: Service-level hospital coverage table mapped to canonical hospital_categories.
    applies_to: [hospital, combined]
    required: true
    values:
      - keys:
          - category  # canonical_name from hospital_categories
          - status    # included | restricted | excluded
          - notes     # e.g., "limited benefits in private hospitals", "podiatric surgeon only - limited benefits"
  - name: restricted_services_definition
    type: string
    description: Fund’s definition of "restricted" benefits (e.g., default/shared room public rate only).
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: ambulance_cover
    type: list[object]
    description: Ambulance benefits (scope, limits, waits, constraints by transport mode or state scheme).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values:
      - keys:
          - scope           # e.g., emergency, urgent, non-emergency, treatment-no-transport
          - transport_modes # e.g., road, air, sea
          - provider_type   # e.g., state ambulance provider only
          - waiting_period_days
          - annual_limit_amount
          - per_event_limit_amount
          - notes
  - name: accident_cover
    type: list[object]
    description: Accident coverage terms for hospital/extras (eligibility windows and definitions).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values:
      - keys:
          - covered           # boolean
          - waiting_period_days
          - medical_review_window_days  # e.g., seek treatment within 7 days
          - benefit_window_days          # e.g., 90 or 180 days
          - inclusions_notes
          - exclusions_notes
  - name: hospital_waiting_periods
    type: list[object]
    description: Waiting periods for hospital services (general, specific categories, pre-existing).
    applies_to: [hospital, combined]
    required: false
    values:
      - keys:
          - service_group  # e.g., All other hospital services; Psychiatric/Rehab/Palliative; Pre-existing conditions; Urgent ambulance
          - period
          - notes
  - name: extras_waiting_periods
    type: list[object]
    description: Waiting periods by extras category or group (e.g., Optical 6m, Major Dental 12m, All other 2m).
    applies_to: [extras, generalhealth, combined]
    required: false
    values:
      - keys: [service_group, period, notes]
  - name: extras_benefits
    type: list[object]
    description: Normalised schedule of extras/general treatment benefits.
    applies_to: [extras, generalhealth, combined]
    required: false
    values:
      - keys:
          - service            # canonical_name from extras_services
          - sub_service        # optional: finer item (e.g., "Periodic exam (012)", "Laser eye surgery")
          - item_codes         # optional e.g., 012, 114, 324
          - benefit_type       # enum percent | fixed | no_gap | schedule
          - benefit_value      # number (AUD or percent per benefit_type)
          - per_visit_cap      # optional number (AUD)
          - annual_limit_per_person
          - annual_limit_per_family
          - sub_limit          # optional number (AUD) or text
          - lifetime_limit     # optional number (AUD) or text
          - limit_period       # enum financial_year | calendar_year | per_2_years | per_3_years | per_5_years | lifetime
          - frequency_limits   # e.g., "2 services per person/year"
          - waiting_period     # e.g., "2 months", "12 months"
          - network_requirement # e.g., "optical network", "smile.com.au", "agreement provider only"
          - notes
  - name: limits_policy_reset
    type: enum
    description: Whether annual limits reset on calendar or financial year.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [calendar_year, financial_year]
  - name: family_limit_rules
    type: string
    description: Text describing how family limits apply/aggregate across members.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: provider_recognition_rules
    type: string
    description: Recognition requirements for providers (e.g., qualified, registered; specific instructions for counselling).
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: benefit_payment_rules
    type: string
    description: Rules like "one service per person per provider per day" or "not payable where Medicare benefits apply".
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: pre_existing_condition_definition
    type: string
    description: Fund definition/assessment process for pre-existing conditions.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: exclusions_general
    type: list[object]
    description: High-level exclusions lists (e.g., services not recognised by Medicare, overseas treatment, non-medical items).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values:
      - keys: [category, details]
  - name: prostheses_devices_policy
    type: string
    description: Statement on government prostheses list coverage and/or device inclusions.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: in_hospital_pharmacy_policy
    type: string
    description: Non-PBS in-hospital pharmacy cover description, limits and per-episode co-payments.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: network_programs_and_perks
    type: list[object]
    description: Named partner programs/networks relevant to cover (e.g., Access Gap, Member Plus hospitals, smile.com.au dental, optical networks).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values:
      - keys: [program_name, domain, notes]
  - name: product_conditions_and_notes
    type: string
    description: Miscellaneous conditions such as "no excess on admission", "limited benefits for podiatric surgeon services".
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: contact_details
    type: string
    description: Contact channels for the fund (phone, email, URL) as printed.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
