notes:
  - Cross-company stability patterns observed:
    - Hospital cover consistently presents government clinical categories with statuses Included/Restricted/Excluded.
    - "Restricted" is defined as minimum/default/shared-room public benefits; large out-of-pockets at private hospitals.
    - Ambulance cover differs by: emergency/urgent scope, transport mode restrictions (often road only), and state levy schemes.
    - Accident cover requires treatment within 7 days of incident; benefit window varies by fund (e.g., 90–180 days).
    - Pre-existing conditions generally 12 months; some categories (Psychiatric/Rehab/Palliative) at 2 months for hospital.
    - Extras limits typically reset annually on financial year (some funds) or calendar year (others); sub-limits and family caps common.
    - Provider recognition is mandatory for benefits; services payable only when Medicare does not pay a benefit for that service.
  - Evidence anchors from supplied PDFs:
    - Nurses & Midwives Health StarterPak Basic Plus: combined product; Basic Plus tier; Access Gap; agreement hospitals; ambulance waits 1 day; extras schedule with per-item fixed benefits and sub-limits; calendar-year limits; "restricted" definitions.
    - Defence Health Value Extras: financial-year limits from 1 July; dental/optical and extensive allied health schedule; device/appliance sub-limits and replacement periods; school accident cover; pharmacy gap rules.
    - Peoplecare/LHM High Extras: financial-year limits; % benefits with fixed per-visit caps; ambulance 1 day nationwide; pharmacy paid to PBS-gap; lifetime limit for orthodontics; network no-gap dental and optical ranges.
    - HBF Basic Hospital Plus: Basic Plus tier; table of Included/Restricted/Excluded categories; urgent ambulance by road only; excess options and application; in-hospital non-PBS pharmacy cap with per-episode co-pay; detailed accident criteria and 90-day window.
