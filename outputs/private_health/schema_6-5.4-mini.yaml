notes: |
  Normalize hospital clinical categories and extras services across funds even when naming varies by capitalisation, punctuation, or clinical wording.
  Treat “restricted”, “included/covered”, and “excluded” as distinct service statuses; many PDFs use checkmarks, R/C/E markers, or narrative explanations.
  Capture both general product-level benefit structures (e.g. 60% back, fixed amount, no annual limit) and service-level sub-limits or replacement periods.
  For hospital products, model hospital accommodation, theatre fees, medical services, prostheses/devices, ambulance, excess, accident cover, gap cover, and waiting periods separately.
  For extras/generalhealth products, model provider network rules, consultation frequency limits, annual/lifetime/rolling limits, and item-specific notes such as face-to-face only or recognised provider requirements.
  Where documents mention “members’ choice”, “member plus”, “smile.com.au”, “AHSA”, “ARHG”, “Access Gap”, “GapCover”, “No Gap”, or similar networks/schemes, capture the scheme name as an alias or provider_network value.
  Many products use different limit reset cycles: calendar year, financial year, membership year, rolling year, or lifetime. Preserve the original wording in limit_notes when exact behavior matters.
  Some products quote benefit percentages relative to cost, others quote fixed dollar amounts or “set benefits” that depend on provider or item. Keep both benefit_percentage and benefit_fixed_amount available.
  Several documents include product closures or sale restrictions (e.g. closed to new members, retained members only). Capture these in availability and notes when relevant.
  Use source_references to retain page-level evidence for product identity, status markers, waiting periods, limits, and exclusions; include short quotes rather than full transcriptions where possible.
