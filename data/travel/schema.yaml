vertical: travel
version: "1.0"
coverage:
  fields:
    - name: product_name
      type: string
    - name: product_tier
      type: enum
      values: [Comprehensive, Standard, Basic, BareEssentials]
    - name: trip_type
      type: enum
      values: [single_trip, annual_multi_trip, one_way]
    - name: medical_limit
      type: currency
    - name: cancellation_limit
      type: currency
    - name: luggage_limit
      type: currency
    - name: excess
      type: currency
    - name: adventure_sports_covered
      type: bool
    - name: pre_existing_conditions
      type: enum
      values: [covered, excluded, assessment_required]
