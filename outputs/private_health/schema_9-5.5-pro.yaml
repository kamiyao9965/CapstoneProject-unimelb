vertical: private_health
version: 0.1-draft
description: >-
  Reusable extraction schema for Australian private health insurance product PDFs covering
  hospital-only, extras-only, generalhealth/ancillary and combined hospital-plus-extras products.
  The schema captures normalized product metadata, hospital treatment category status, extras
  service and item benefits, waiting periods, limits, excesses, co-payments, provider/network
  conditions, exclusions and source evidence references without extracting individual product records.
product_types:
  - hospital
  - extras
  - generalhealth
  - combined
fields:
  - name: source_file_path
    type: string
    description: Original PDF path, URL or storage key used as the evidence source.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: source_document_title
    type: string
    description: Title shown on the PDF, such as product sheet, product guide or cover summary.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: document_code
    type: string
    description: Brochure, form or publication code printed on the document, where present.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: source_references
    type: list[object]
    description: >-
      Evidence references for extracted fields. Each object should include field_name,
      file_path, page_number, section_heading, raw_text_quote and confidence where available.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: fund_name
    type: string
    description: Health fund or insurer name as presented to members.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: fund_brand
    type: string
    description: Trading brand if different from the legal entity.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: legal_entity_name
    type: string
    description: Registered legal entity responsible for the product.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: abn
    type: string
    description: Australian Business Number printed in the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: afsl
    type: string
    description: Australian Financial Services Licence number if printed.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: contact_details
    type: list[object]
    description: Contact channels. Each object may include type, value, hours, url and notes.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: product_name
    type: string
    description: Marketed product or cover name.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: product_type
    type: enum
    description: Normalized product type inferred from the document and product composition.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [hospital, extras, generalhealth, combined]
  - name: product_components
    type: list[object]
    description: >-
      Components included in a combined or bundled product. Each object may include component_type,
      component_name, hospital_tier, extras_level and source_references.
    applies_to: [combined]
    required: false
    values: []
  - name: product_marketing_level
    type: string
    description: Product level or descriptor used by the fund, such as Basic Plus, Value, High or Starter.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: product_summary
    type: string
    description: Short narrative description of the cover as stated in the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: effective_date
    type: string
    description: Product effective date, normalized to ISO date where possible while preserving evidence.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: as_at_date
    type: string
    description: As-at date printed for benefit schedules or product information.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: information_current_date
    type: string
    description: Date the information is stated to be current or correct.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: currency
    type: enum
    description: Currency used for monetary benefits, limits, excesses and co-payments.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [AUD]
  - name: hospital_tier
    type: enum
    description: Normalized Australian hospital cover tier, including Plus variants.
    applies_to: [hospital, combined]
    required: false
    values: [basic, basic_plus, bronze, bronze_plus, silver, silver_plus, gold, not_applicable, unknown]
  - name: includes_hospital
    type: boolean
    description: Whether the product includes hospital cover.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: includes_extras
    type: boolean
    description: Whether the product includes extras, ancillary or general health services.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: includes_ambulance
    type: boolean
    description: Whether ambulance treatment or transport benefits are included.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: includes_accident_cover
    type: boolean
    description: Whether accident-related cover or upgraded accident benefits are described.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: feature_highlights
    type: list[object]
    description: Member-facing feature bullets. Each object may include feature_name, description and source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: membership_eligibility
    type: string
    description: Eligibility restrictions or target membership group, if stated.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: coverage_status
    type: enum
    description: >-
      Normalized coverage status. Use for standalone statuses and within nested coverage objects.
      Map ticks/check marks to included or covered, crosses to excluded/not_covered, and R/restricted
      labels to restricted.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [included, covered, restricted, excluded, not_covered, no_gap, limited, unlimited, conditional, unknown, not_applicable]
  - name: benefit_calculation_type
    type: enum
    description: Normalized method used to calculate a benefit amount.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [fixed_amount, up_to_amount, percentage, percent_up_to_amount, no_gap, full_cost, mbs_fee, default_benefit, pbs_gap, prescribed_list, unlimited, not_payable, other, unknown]
  - name: default_limit_period
    type: enum
    description: Default period used for product limits where stated.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [calendar_year, financial_year, rolling_year, per_admission, per_hospital_episode, per_service, per_day, lifetime, every_n_years, unknown]
  - name: limit_reset_date
    type: string
    description: Date limits reset, such as 1 January for calendar-year limits or 1 July for financial-year limits.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: hospital_category_coverages
    type: list[object]
    description: >-
      One object per hospital treatment category. Object fields should include canonical_category
      from hospital_categories, source_alias, raw_status, coverage_status, benefit_basis,
      restriction_description, notes and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_facility_coverages
    type: list[object]
    description: >-
      Hospital facility benefits such as accommodation, theatre fees, intensive care fees,
      labour ward fees and same-day surgery. Include setting, coverage_status, benefit_basis,
      excess_applies, member_pays and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_accommodation_benefits
    type: list[object]
    description: >-
      Room and accommodation cover. Include hospital_setting, room_type, coverage_status,
      benefit_basis, subject_to_availability, out_of_pocket_warning and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_medical_benefits
    type: list[object]
    description: >-
      In-hospital medical benefits such as choice of doctor, specialist fees, MBS fee contribution,
      medically necessary tests, Access Gap or medical gap arrangements and prostheses/device benefits.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: agreement_hospital_networks
    type: list[object]
    description: >-
      Contracted hospital network arrangements. Include network_name, hospital_setting,
      benefit_impact, url, limitations and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: gap_cover_arrangements
    type: list[object]
    description: >-
      Gap schemes for in-hospital doctors or specialists. Include scheme_name, applies_to,
      opt_in_basis, expected_member_gap, provider_lookup_url and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: medical_devices_and_prostheses
    type: list[object]
    description: >-
      Benefits for surgically implanted prostheses, medical devices and human tissue products.
      Include prescribed_list_requirement, benefit_basis, possible_out_of_pocket and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_inpatient_pharmacy
    type: list[object]
    description: >-
      In-hospital pharmacy benefits, especially non-PBS medicines. Include inclusion_in_hospital_agreement,
      benefit_limit, copayment_amount, per_episode_rules, exclusions and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: excess_options
    type: list[object]
    description: >-
      Hospital excess options. Include amount, currency, per_person_period, policy_maximum,
      day_admission_applies, overnight_admission_applies, waived_for_dependants and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: copayments
    type: list[object]
    description: >-
      Member co-payments. Include service, amount, currency, trigger, period or episode basis,
      exemptions and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: waiting_periods
    type: list[object]
    description: >-
      Waiting periods for hospital categories, extras services, ambulance, accident cover,
      excess changes or grouped services. Include service_type, canonical_name, source_alias,
      duration_value, duration_unit, raw_duration, applies_on_join, applies_on_upgrade,
      exceptions and source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: transfer_switching_rules
    type: list[object]
    description: >-
      Rules for transferring from another fund or changing cover. Include recognition_window_days,
      same_or_lower_cover_rule, higher_cover_rule, partial_waiting_period_rule, break_in_cover_rule
      and source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: pre_existing_condition_rules
    type: list[object]
    description: >-
      Pre-existing condition rules. Include lookback_months, waiting_period, decision_maker,
      applicable_services, exclusions and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: accident_cover_rules
    type: list[object]
    description: >-
      Accident cover definitions and claim conditions. Include accident_definition,
      must_occur_after_joining, must_occur_in_australia, medical_review_deadline_days,
      admission_deadline_days, ongoing_treatment_window_days, exclusions and source_references.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: ambulance_coverages
    type: list[object]
    description: >-
      Ambulance benefits. Include ambulance_type, transport_mode, emergency_or_urgent_only,
      coverage_status, benefit_percent, benefit_amount, annual_limit, waiting_period,
      approved_provider_requirement, state_specific_rules, exclusions and source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: extras_service_coverages
    type: list[object]
    description: >-
      Category-level extras or generalhealth service benefits. Include canonical_service from
      extras_services, source_alias, coverage_status, benefit_calculation_type, benefit_percent,
      benefit_amount, annual_limit, family_limit, lifetime_limit, waiting_period, shared_limit_group,
      provider_conditions and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: extras_item_benefits
    type: list[object]
    description: >-
      Item-level extras benefits. Include canonical_service, item_name, item_number, source_alias,
      benefit_calculation_type, benefit_amount, benefit_percent, per_item_limit, frequency_limit,
      waiting_period, conditions and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: extras_limits
    type: list[object]
    description: >-
      Limits for extras services or items. Include canonical_service, limit_scope
      (person, family, child, eye, prescription, policy), amount, period, reset_date,
      sublimit, lifetime_limit, replacement_period_years and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: extras_frequency_limits
    type: list[object]
    description: >-
      Frequency limits such as services per person per year, maximum x-rays, one mouthguard per year,
      or replacement periods. Include canonical_service, item_number, frequency_count, frequency_period,
      combination_rules and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: network_provider_benefits
    type: list[object]
    description: >-
      Network or preferred-provider arrangements for dental, optical or other services. Include
      network_name, canonical_service, no_gap_available, discount_percent, included_items,
      annual_limit_interaction, participating_provider_requirement and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: recognised_provider_rules
    type: list[object]
    description: >-
      Provider recognition rules. Include provider_type, registration_requirement, private_practice_only,
      australian_abn_required, fund_recognition_required, family_member_exclusion and source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: pharmacy_rules
    type: list[object]
    description: >-
      Pharmacy and prescription benefit rules. Include PBS_gap_basis, non_PBS_only,
      TGA_approval_required, prescription_required, vaccination_inclusion, excluded_items
      and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: health_management_program_rules
    type: list[object]
    description: >-
      Rules for health, wellbeing, healthy lifestyle, preventive health and screening programs.
      Include condition_specific_requirement, declaration_or_form_required, Medicare_exclusion,
      approved_programs, excluded_sport_recreation_items and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: devices_and_appliances_benefits
    type: list[object]
    description: >-
      Extras benefits for aids, appliances and equipment. Include canonical_service, item_name,
      purchase_or_rental, maintenance_or_accessory, benefit_amount, sublimit, waiting_period,
      replacement_period_years, prescription_required and source_references.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: exclusions
    type: list[object]
    description: >-
      Services, circumstances or costs not payable. Include applies_to, exclusion_category,
      description, related_service, exception_if_any and source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: claim_conditions
    type: list[object]
    description: >-
      Conditions affecting claims, such as claim lodgement deadlines, one service per provider
      per day, no charge raised, third-party compensation, overseas treatment, unfinancial membership
      or Medicare availability. Include source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: claims_lodgement_period_months
    type: number
    description: Maximum age of claims accepted, expressed in months where stated.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: claim_methods
    type: list[object]
    description: Claim submission methods such as card swipe, member portal, mobile app, email, fax or post.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: governing_document_references
    type: list[object]
    description: References to membership guides, fund rules, privacy policies, code of conduct or PHIS documents.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: out_of_pocket_risks
    type: list[object]
    description: >-
      Potential out-of-pocket cost scenarios. Include risk_type, applies_to, trigger,
      member_pays_description, mitigation_advice and source_references.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: special_category_notes
    type: list[object]
    description: >-
      Product-specific notes for categories with cross-category complexity, such as hernia repairs,
      dental surgery without Medicare benefits, cancer treatment across body-system categories,
      or state ambulance schemes.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
