vertical: private_health
version: 0.1-draft
description: Reusable cross-fund schema for Australian private health insurance product documents covering hospital, extras, general health/extras-only, and combined products. The schema is designed for document-level extraction of product structure, coverage categories, waiting periods, limits, benefits, excess/co-payments, conditions, and source evidence from PDF brochures, cover summaries, and product guides. It does not model individual claims or customer-specific pricing.
product_types:
  - hospital
  - extras
  - generalhealth
  - combined
fields:
  - name: product_name
    type: string
    description: Marketing or official product name as shown in the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: fund_name
    type: string
    description: Trading name or health fund/company offering the product.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: legal_entity_name
    type: string
    description: Legal entity name if stated separately from the fund trading name.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: abn
    type: string
    description: ABN of the insurer or legal entity where shown.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: document_title
    type: string
    description: Source document title, such as Product Guide, Cover Summary, or Product Sheet.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: product_type
    type: enum
    description: High-level product type represented by the document or section.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [hospital, extras, generalhealth, combined]

  - name: tier
    type: enum
    description: Hospital tier where stated or inferable from the product, typically aligned to Australian private health tiers.
    applies_to: [hospital, combined]
    required: false
    values: [Basic, BasicPlus, Bronze, BronzePlus, Silver, SilverPlus, Gold, Unknown]

  - name: cover_name_variant
    type: string
    description: Alternate display form of the cover name, such as with tier suffixes or descriptors.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: effective_date
    type: string
    description: Document or product effective date.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: information_current_as_at
    type: string
    description: Current-as-at date stated in the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: subject_to_change
    type: boolean
    description: Whether the document explicitly states benefits or terms are subject to change.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [true, false]

  - name: summary_description
    type: string
    description: Short prose summary of the product's purpose or positioning.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: available_excess_options
    type: list[object]
    description: Available hospital excess options described for the cover.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: hospital_excess_amount
    type: number
    description: Standard or selected excess amount for hospital admissions.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: excess_applies_per
    type: enum
    description: Unit for how excess is applied.
    applies_to: [hospital, combined]
    required: false
    values: [admission, member_per_calendar_year, policy_per_calendar_year, episode, unknown]

  - name: excess_max_per_year
    type: string
    description: Cap on annual excess application, often expressed for single/couple/family policies.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: excess_waived_for_dependants
    type: boolean
    description: Whether excess is waived for dependant children.
    applies_to: [hospital, combined]
    required: false
    values: [true, false]

  - name: hospital_copayment_amount
    type: number
    description: Hospital co-payment amount if the product uses a co-payment instead of or in addition to an excess.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: has_no_hospital_excess
    type: boolean
    description: Indicates the document states no hospital excess applies.
    applies_to: [hospital, combined]
    required: false
    values: [true, false]

  - name: hospital_room_coverage
    type: list[object]
    description: Room and accommodation entitlements by hospital type, such as private/shared room and agreement/member plus status.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: agreement_hospital_cover
    type: boolean
    description: Whether the product references agreement hospitals/member plus hospitals/private hospital agreements.
    applies_to: [hospital, combined]
    required: false
    values: [true, false]

  - name: agreement_hospital_term
    type: string
    description: Fund-specific name for contracted hospitals, such as Agreement Hospital or Member Plus hospital.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: public_hospital_private_patient_benefit
    type: string
    description: Summary of how benefits apply when admitted as a private patient in a public hospital.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: choice_of_doctor
    type: boolean
    description: Whether the document states members can choose their doctor.
    applies_to: [hospital, combined]
    required: false
    values: [true, false]

  - name: access_gap_cover_available
    type: boolean
    description: Whether Access Gap or equivalent medical gap cover is mentioned.
    applies_to: [hospital, combined]
    required: false
    values: [true, false]

  - name: access_gap_cover_name
    type: string
    description: Fund-branded name for in-hospital medical gap arrangement.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: prostheses_cover
    type: string
    description: Summary of cover for government-approved prostheses or surgically implanted prostheses.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: medical_devices_cover
    type: string
    description: Summary of cover for medical devices, human tissue products, or prescribed lists.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: in_hospital_pharmacy_cover
    type: string
    description: Summary of in-hospital pharmacy benefits and conditions.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: in_hospital_pharmacy_limit_amount
    type: number
    description: Maximum payable amount for in-hospital pharmacy where specified.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: in_hospital_pharmacy_copayment_amount
    type: number
    description: Member co-payment for in-hospital pharmacy per episode where specified.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: ambulance_cover
    type: list[object]
    description: Ambulance cover entries including emergency/non-emergency, road/air/sea, limits, and waiting periods.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: accident_cover
    type: boolean
    description: Whether accident cover is explicitly included.
    applies_to: [hospital, combined]
    required: false
    values: [true, false]

  - name: accident_cover_summary
    type: string
    description: Summary of accident cover rules, such as treatment within 7 days and admission windows.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: accident_cover_admission_window_days
    type: number
    description: Maximum days after accident or initial medical presentation within which hospital admission is covered.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: pre_existing_condition_definition
    type: string
    description: Document wording summarising how pre-existing conditions are defined.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: transfer_recognition_window_days
    type: number
    description: Maximum break or transfer window in days to avoid re-serving waiting periods.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: waiting_periods
    type: list[object]
    description: Waiting periods by service, category, or rule. May include duration, unit, scope, and exceptions.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: hospital_categories
    type: list[object]
    description: Hospital treatment categories with canonical category name and coverage status.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: hospital_category_status
    type: enum
    description: Coverage status used for a hospital category or service.
    applies_to: [hospital, combined]
    required: false
    values: [Included, Restricted, Excluded, Covered, NotCovered, Unknown]

  - name: extras_services
    type: list[object]
    description: Extras/general health service categories with benefits, limits, sub-limits, waiting periods, and conditions.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: benefit_structure
    type: enum
    description: Common structure used to describe extras benefits.
    applies_to: [extras, generalhealth, combined]
    required: false
    values:
      - fixed_dollar_per_service
      - percentage_of_cost
      - percentage_up_to_cap
      - annual_limit_only
      - no_gap_network
      - unlimited
      - mixed
      - unknown

  - name: benefit_amount
    type: number
    description: Nominal dollar benefit amount for a service item where applicable.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: benefit_percentage
    type: number
    description: Percentage benefit payable for a service where applicable.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: annual_limit_amount
    type: number
    description: Annual per person or per policy limit amount for a category or service.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: annual_limit_scope
    type: enum
    description: Scope of the annual limit.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [per_person, per_family, per_child_dependant, per_policy, per_eye, unlimited, unknown]

  - name: annual_limit_period
    type: enum
    description: Period used for annual or recurring limit reset.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [calendar_year, financial_year, rolling_period, every_2_years, every_3_years, every_5_years, unknown]

  - name: family_limit_amount
    type: number
    description: Family-level annual limit where separately specified.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: sub_limits
    type: list[object]
    description: Nested sub-limits under a broader annual category limit.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: lifetime_limit_amount
    type: number
    description: Lifetime limit, commonly used for orthodontics.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: service_frequency_limit
    type: string
    description: Frequency or utilisation restriction, such as max services per year, per day, or every N years.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: provider_recognition_required
    type: boolean
    description: Whether services must be provided by a recognised or approved provider.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [true, false]

  - name: provider_networks
    type: list[object]
    description: Contracted provider or partner networks such as dental or optical networks, including no-gap arrangements.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: no_gap_offers
    type: list[object]
    description: No-gap or reduced-gap offers tied to selected services, providers, or networks.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: recognised_provider_notes
    type: string
    description: Notes about provider recognition requirements or professional registration.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: claim_conditions
    type: list[object]
    description: General claiming conditions, exclusions, or administrative requirements.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: exclusions_and_non_payables
    type: list[object]
    description: Explicit exclusions, non-payable items, or situations where benefits are not payable.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: healthy_lifestyle_program_required_form
    type: boolean
    description: Whether a declaration or program form is required for health management or lifestyle benefits.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [true, false]

  - name: pharmaceutical_rules
    type: string
    description: Rules for pharmaceutical benefits, such as non-PBS only, PBS gap, TGA approval, exclusions, or prescription requirements.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: claims_submission_window
    type: string
    description: Maximum time after date of service for submitting claims.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: source_references
    type: list[object]
    description: Evidence references back to the source PDF, including page numbers, section labels, table headers, quotes, and file path.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: contact_phone
    type: string
    description: Primary customer contact phone number from the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: contact_email
    type: string
    description: Contact email from the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: website
    type: string
    description: Primary website or product URL in the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: code_of_conduct_member
    type: boolean
    description: Whether the fund states it is a signatory/member of the Private Health Insurance Code of Conduct.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [true, false]

