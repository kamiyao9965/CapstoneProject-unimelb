vertical: private_health
version: 0.1-draft
description: >
  Cross-company extraction schema for Australian private health insurance product
  collateral covering Hospital, Extras/General Health, and Combined products.
  Normalises core product identity, tiering, coverage status (Included/Restricted/Excluded),
  waiting periods, limits, benefits, excess/co-payment terms, provider/network conditions,
  and evidence references. Inferred from:
  - Nurses & Midwives Health: StarterPak Basic Plus Product Sheet (effective 10 Oct 2025)
  - Defence Health: Value Extras Product Guide (effective 1 Jul 2024)
  - Peoplecare: High Extras Cover (as at 1 Jul 2025)
  - HBF: Basic Hospital Plus Cover Summary (info correct 26 Aug 2024)

product_types:
  - hospital
  - extras
  - generalhealth
  - combined

fields:
  - name: product_name
    type: string
    description: Marketing/product name as printed on the brochure (e.g., "StarterPak (Basic Plus)", "Basic Hospital Plus", "Value Extras", "High Extras").
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []

  - name: fund_name
    type: string
    description: Fund or company trading name on the brochure (e.g., Nurses & Midwives Health, Defence Health, Peoplecare, HBF).
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []

  - name: product_type
    type: enum
    description: Product vertical classification.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: [hospital, extras, generalhealth, combined]

  - name: cover_tier
    type: enum
    description: Government hospital tier (and plus variants) or insurer-declared tier for combined products. Leave null for extras-only products.
    applies_to: [hospital, combined]
    required: false
    values: [Basic, Basic Plus, Bronze, Bronze Plus, Silver, Silver Plus, Gold]

  - name: effective_date
    type: string
    description: Brochure "effective as at" or "current at" date.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: eligibility
    type: string
    description: Membership eligibility or cohort restrictions where stated (e.g., nurses and midwives and their families).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: cover_summary
    type: string
    description: Short insurer description or feature bullets describing the product.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: agreement_hospital_network
    type: string
    description: Name/reference of contracted/private hospital network (e.g., Agreement hospitals, Member Plus hospitals) and notes on private/public settings.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: medical_gap_scheme
    type: string
    description: Doctor gap arrangement name and applicability (e.g., Access Gap Cover; participation may vary by specialist).
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: accident_cover
    type: list[object]
    description: >
      Terms for accident cover where offered. Object keys:
      - included (boolean)
      - waiting_period_days (number)
      - treatment_window_days (number)  # e.g., benefits payable within 90 or 180 days
      - first_treatment_within_days (number)  # e.g., must see a practitioner within 7 days
      - scope (string)  # e.g., inpatient only; Australia only
      - exclusions (string)
    applies_to: [hospital, combined, extras, generalhealth]
    required: false
    values: []

  - name: ambulance_cover
    type: list[object]
    description: >
      Ambulance benefit parameters. Object keys:
      - emergency_road (boolean)
      - urgent_road (boolean)
      - non_emergency (boolean)
      - air_or_sea (boolean)
      - waiting_period_days (number)
      - annual_limit_person (number)  # dollars; null if unlimited
      - annual_limit_family (number)
      - per_episode_copayment (number)
      - state_scheme_notes (string)  # handling for QLD/TAS schemes or levy arrangements (NSW/ACT)
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: hospital_excess
    type: list[object]
    description: >
      Excess/co-payment terms for hospital admissions. Object keys:
      - option_amount (number)  # e.g., 500, 750
      - applies_per (enum)  # per_admission, per_person_per_year
      - max_per_policy_year (number)  # e.g., twice per couple/family
      - child_excess_waived (boolean)
      - day_and_overnight (boolean)
      - reduction_waiting_rule (string)  # waiting rules when reducing excess
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: in_hospital_pharmacy
    type: list[object]
    description: >
      Non-PBS in-hospital pharmacy policy. Object keys:
      - included_in_agreement (boolean)
      - per_episode_cap (number)
      - per_episode_copayment (number)
      - notes (string)
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: prostheses_devices_policy
    type: string
    description: Statement regarding payment only for government-listed prostheses/medical devices and patient liability above list price.
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: hospital_waiting_periods
    type: list[object]
    description: >
      Core waiting periods. Object keys:
      - service_group (enum)  # pre_existing, mental_health_rehab_palliative, all_other_hospital, ambulance
      - months (number)  # or days where applicable
      - days (number)
      - notes (string)
    applies_to: [hospital, combined]
    required: false
    values: [pre_existing, mental_health_rehab_palliative, all_other_hospital, ambulance]

  - name: hospital_coverages
    type: list[object]
    description: >
      Coverage map over standard clinical categories. Object keys:
      - category (enum)  # see hospital_categories canonical names
      - status (enum)  # Included, Restricted, Excluded
      - notes (string)  # e.g., limited benefits in private hospitals; category caveats
      - reference (string)  # document/page citation
    applies_to: [hospital, combined]
    required: false
    values: [Included, Restricted, Excluded]

  - name: restricted_services_definition
    type: string
    description: >
      Fund’s definition of Restricted benefits (e.g., default/shared-room public hospital equivalent; significant out-of-pocket in private hospitals).
    applies_to: [hospital, combined]
    required: false
    values: []

  - name: extras_limit_reset_period
    type: enum
    description: Period in which extras limits reset.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [calendar_year, financial_year, membership_year]

  - name: extras_waiting_periods
    type: list[object]
    description: >
      Waiting periods by service group. Object keys:
      - service (enum)  # see extras_services canonical names or service groups such as MajorDental, Optical
      - months (number)
      - days (number)
      - notes (string)
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: extras_benefits
    type: list[object]
    description: >
      Benefit schedule for extras/general health. One object per service or sub-service.
      Object keys:
      - service (enum)  # see extras_services canonical names
      - sub_service (string)  # e.g., Initial consultation, Standard consult, Frames, Contact lenses, Laser eye surgery
      - benefit_type (enum)  # fixed_amount, percentage, percentage_to_cap, no_gap, schedule
      - benefit_amount (number)  # dollars or percentage (store percentage as number, e.g., 70 for 70%)
      - annual_limit_person (number)
      - annual_limit_family (number)
      - lifetime_limit (number)
      - sub_limit_notes (string)  # frequency rules, item-code limits, per-eye/3-year cycles
      - replacement_cycle_years (number)  # for appliances/hearing aids/orthotics where stated
      - group_therapy (boolean)
      - provider_network (string)  # e.g., smile.com.au, optical network, agreement/no-gap notes
      - recognition_rules (string)  # recognised providers criteria
      - notes (string)
      - reference (string)
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [fixed_amount, percentage, percentage_to_cap, no_gap, schedule]

  - name: healthy_lifestyle_programs
    type: list[object]
    description: >
      Approved health/healthy lifestyle program benefits.
      Keys: program_type (string), reimbursement_percent (number), annual_limit_person (number),
      documentation_required (string), notes, reference.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: pharmacy_non_pbs
    type: list[object]
    description: >
      Non‑PBS pharmaceuticals/vaccinations benefit rules.
      Keys: per_script_cap (number), reimbursement_percent (number), annual_limit_person (number),
      annual_limit_family (number), exclusions (string), waiting_period_months (number), reference (string).
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: medical_devices_appliances
    type: list[object]
    description: >
      Out‑of‑hospital aids/appliances benefits (extras). Keys:
      item (string), sub_limit (number), annual_limit_person (number), waiting_period_months (number),
      replacement_cycle_years (number), maintenance_sub_limit (number), notes (string), reference (string).
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: provider_and_claiming_rules
    type: string
    description: >
      General claiming rules and recognised provider criteria (e.g., services must be from recognised providers,
      one service per person per day, claims within two years).
    applies_to: [extras, generalhealth, combined, hospital]
    required: false
    values: []

  - name: exclusions_general
    type: string
    description: >
      Non-claimable services/items common across brochures (e.g., cosmetic surgery, non-medically necessary,
      non-recognised providers, services covered by third parties, services overseas).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

  - name: sublimits_and_frequencies
    type: list[object]
    description: >
      Normalised frequency caps by item/service (e.g., "Periodic exam 012 – 2 per person/year",
      "Chiro x-rays max 2 per FY"). Keys: service (string), rule (string), reference (string).
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []

  - name: evidence
    type: list[object]
    description: >
      Source references for extracted data. Keys: source_title (string), fund_name (string),
      effective_date (string), page (string), file_path (string), url (string).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

