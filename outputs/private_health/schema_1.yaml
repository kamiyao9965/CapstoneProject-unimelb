notes:
  - Cross-fund hospital patterns observed: Basic Plus tiers include Included, Restricted, and Excluded categories. Restricted = default/public-shared-room benefits only; private hospital treatment for restricted services can create large out‑of‑pocket costs.
  - Gap schemes are referenced by name and purpose (e.g., Access Gap Cover; HBF agreements with doctors) and should be captured under medical_gap_scheme with the link, where provided.
  - Agreement/contracted hospital terminology varies (Agreement hospitals, Member Plus hospitals). Capture the network name and the rule differences for non‑agreement hospitals.
  - Ambulance benefits appear under both hospital and extras. Capture mode (road/air/sea), urgency (emergency/urgent/non‑emergency), provider restrictions (state-approved/approved HBF provider), waiting days, and any annual or per‑person limits. Include state-based instructions where explicitly given.
  - Accident cover conditions to capture: joining wait (often 1 day), requirement to see a practitioner within a set number of days (e.g., 7 days), treatment window (e.g., 90 or 180 days), Australia-only scope, and whether hospital admission is required.
  - In-hospital non‑PBS pharmacy may have per‑episode member co‑payments and per‑episode/per‑admission limits (e.g., up to a dollar limit with a per‑episode co‑payment). Capture whether included in the hospital agreement.
  - Prostheses rules consistently refer to the Government Prostheses List; capture this plus any explicit warning about potential out‑of‑pocket amounts above approved benefits.
  - Extras benefits differ by benefit structure—percentage of charge up to category limits, fixed scheduled dollar amounts per service, 100% back up to a limit, or per‑item codes (ADA/OPTOM item numbers). Represent all through extras_benefits with per‑item schedule entries and frequency limits (e.g., “2 services per person/year”; “max 2 x‑rays per financial year”).
  - Waiting periods vary by service: common patterns include 1 day ambulance, 2 months most extras and non‑pre‑existing hospital services, 6 months optical/healthy lifestyle, 12 months major dental/orthodontics/hearing aids, and 12 months pre‑existing for hospital (with statutory exceptions for psych/rehab/palliative in some funds).
  - Limits reset periods differ: calendar year (e.g., NMH) vs financial year (e.g., Defence Health; Peoplecare). Capture globally (benefit_reset_period) and override at benefit level if required.
  - Recognised provider and claiming rules are broadly consistent across documents (registered/approved providers, Australian-based, no benefits for services provided by immediate family on the same policy, claims time limits, one service per person per provider per day). Encode as recognised_provider_rules and claiming_rules with source references.
  - Evidence fields: For each extracted datum store document path/URL, page numbers, and a short snippet to support auditability (e.g., “Non‑emergency ambulance transport $3,000 per person/calendar year” from NMH StarterPak; “In‑hospital non‑PBS pharmacy up to $1,400 with $100 co‑payment per episode” from HBF Basic Hospital Plus).
  - Examples of stable aliases consolidated above were drawn from the supplied brochures: NMH StarterPak Basic Plus (combined), Defence Health Value Extras (extras), Peoplecare High Extras (extras), HBF Basic Hospital Plus (hospital).
