    aliases: [Digital Mental Health, THIS WAY UP]
  - canonical_name: Mouthguards
    description: Custom-fitted mouthguards for dependants or members; sometimes no-gap via dental network.
    aliases: [Mouthguard, Dental item 151]
notes:
  - This schema reflects stable fields common across the supplied documents: combined Basic Plus hospital/extras (Nurses & Midwives Health StarterPak Basic Plus), extras-only guides (Defence Health Value Extras; Peoplecare High Extras) and hospital-only (HBF Basic Hospital Plus).
  - Coverage states for hospital categories should be normalised to included, restricted or excluded. Documents may use ticks/crosses or labels; map accordingly.
  - Waiting period periods vary by scope and product. Capture both days and months where provided (e.g., ambulance 1 day; urgent ambulance 7 days; optical 6 months; major dental 12 months).
  - Limits frequently specify per person and per family with period types of calendar year (Nurses & Midwives Health) or financial year (Defence Health, Peoplecare). Capture period_type.
  - Extras benefits may be expressed as percentages, fixed dollar per item, or “up to” amounts with sub-limits and frequency caps (e.g., dental item numbers, group therapy). Use extras_benefits with extras_limits and reference_codes to preserve detail.
  - Ambulance cover appears under both Hospital and Extras products with different scopes. Use ambulance_cover objects to capture mode, scope, waiting and state-based rules or exclusions.
  - Accident cover rules commonly require treatment within 7 days and cap ongoing treatment within a time window (e.g., 90 or 180 days). Represent these consistently in accident_cover.
  - Hospital excess can be “no excess” (e.g., StarterPak) or member-selected options (e.g., HBF $500/$750) with waiting periods for a lower excess. Use excess_options and copayment where applicable.
  - Gap schemes and agreement hospital networks impact member out-of-pockets (e.g., Access Gap Cover, Member Plus hospitals). Capture scheme names and URLs where provided.
  - Non-PBS in-hospital pharmacy may have per-episode caps and member co-payments (e.g., HBF $1,400 cap and $100 copayment). Store in in_hospital_pharmacy.
  - Recognised provider rules and claiming conditions (e.g., one service per provider per day, receipts age, no benefits where Medicare pays) should be summarised under claiming_rules and exclusions_summary.
  - Evidence objects should cite the document filename or title, effective date and page numbers used for the extracted facts to support auditability.
