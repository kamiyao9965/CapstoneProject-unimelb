    aliases: [Speech therapy]
  - canonical_name: OccupationalTherapy
    description: OT consultations incl. group therapy.
    aliases: [Occupational therapy]
  - canonical_name: Audiology
    description: Hearing testing/consults.
    aliases: [Audiology]
  - canonical_name: EyeTherapyOrthoptics
    description: Orthoptics/eye therapy consultations.
    aliases: [Eye therapy, Orthoptics]
  - canonical_name: Dietetics
    description: Dietitian/nutrition consults.
    aliases: [Dietitian, Dietetics]
  - canonical_name: ComplementaryTherapies
