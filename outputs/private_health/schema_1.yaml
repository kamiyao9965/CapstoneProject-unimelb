vertical: private_health
version: 0.1-draft
description: Reusable extraction schema for Australian private health insurance brochures and product guides. Designed to normalise hospital, extras (general treatment), generalhealth (standalone ambulance/general treatment variants), and combined products across funds. Focuses on stable, cross-company elements: product identity, tier, coverage status by clinical category, waiting periods, limits, benefit structures, excess/co-payments, conditions, provider/network rules, ambulance and accident cover, and evidence references.
product_types:
  - hospital
  - extras
  - generalhealth
  - combined
fields:
  - name: product_name
    type: string
    description: Marketing/product name as printed on the brochure (e.g., StarterPak Basic Plus; Basic Hospital Plus; Value Extras; High Extras).
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: fund_name
    type: string
    description: Health fund or brand (e.g., Nurses & Midwives Health; Defence Health; Peoplecare; HBF).
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: product_type
    type: enum
    description: Normalised product classification.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: [hospital, extras, generalhealth, combined]
  - name: cover_tier
    type: enum
    description: Government tier label where applicable for hospital (incl. Plus variants). Use NotApplicable for extras/generalhealth.
    applies_to: [hospital, combined]
    required: false
    values: [Basic, Basic Plus, Bronze, Bronze Plus, Silver, Silver Plus, Gold, NotApplicable, Unknown]
  - name: effective_date
    type: string
    description: Effective or issue date on the document (ISO-8601 yyyy-mm-dd where possible).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: brochure_identifier
    type: string
    description: Printed code or version on the PDF (e.g., NMH-SPPS-04/25; DEF0527; HI-1318 HBF17499).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: urls_related
    type: list[object]
    description: URLs referenced for detailed coverage, providers, networks, or membership guides.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: benefit_reset_period
    type: enum
    description: Period when annual limits reset (calendar or financial year; if per-service differs, capture at benefit level).
    applies_to: [extras, generalhealth, combined]
    required: false
    values: [calendar_year, financial_year, membership_year, per_episode, per_two_years, per_five_years, unknown]
  - name: provider_networks
    type: list[object]
    description: Named networks and their effect (e.g., Access Gap, dental/optical networks, Member Plus/Agreement hospitals).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: recognised_provider_rules
    type: list[object]
    description: Recognition/registration requirements and common claiming exclusions related to providers.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: claiming_rules
    type: list[object]
    description: Claimed conditions common across funds (e.g., one service per person per day; claim within 2 years; no benefits where Medicare pays for extras; Australian providers only).
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: ambulance_cover
    type: list[object]
    description: Ambulance entitlements. Different funds place ambulance under hospital or extras; capture here with mode, urgency, limits and waits.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: accident_cover
    type: object
    description: Accident cover conditions where present (eligibility window after accident, treatment start, duration, scope).
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: in_hospital_pharmacy
    type: object
    description: Non-PBS in-hospital pharmacy benefits (limits, co-payments, per-episode rules, inclusion within contracted hospital agreements).
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: prostheses_rules
    type: object
    description: Statement of benefits aligned to the Government Prostheses List and any potential out-of-pocket exposure.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: excess_and_copayments
    type: object
    description: Hospital excess options and/or per-day co-payments; dependency waivers; annual maximum charges per policy.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: agreement_hospital_rules
    type: object
    description: Contracted/agreement hospital network naming, coverage differences versus non-agreement hospitals.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: medical_gap_scheme
    type: object
    description: Gap cover scheme name and applicability (e.g., Access Gap Cover; doctor participation; how to check specialists).
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: restricted_services_definition
    type: string
    description: Fund definition of Restricted (minimum/default benefits, likely large out-of-pocket at private hospitals).
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_waiting_periods
    type: list[object]
    description: Waiting periods for hospital services keyed by service group (e.g., 12 months pre-existing; 2 months all other; 1–7 days ambulance; special categories).
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: hospital_service_coverages
    type: list[object]
    description: Coverage matrix by clinical category (Included/Restricted/Excluded) with notes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: private_room_cover
    type: object
    description: Private/shared room rules and whether private room is covered at contracted hospitals.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: extras_waiting_periods
    type: list[object]
    description: Waiting periods for extras categories (e.g., 2 months most; 6 months optical/healthy lifestyle; 12 months major dental/orthodontics/hearing aids).
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: extras_benefits
    type: list[object]
    description: Normalised extras benefits by service, including benefit type (percent/scheduled/fixed/100% up to limit), annual and family limits, per-item benefits, sub-limits, and frequency rules.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: exclusions_and_general_rules
    type: list[object]
    description: Non-payable scenarios and general rules (e.g., overseas services, services by family members, over-the-counter items, cosmetic, non-TGA medicines).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: state_based_ambulance_notes
    type: list[object]
    description: State/Territory scheme handling instructions where provided (e.g., QLD/TAS covered by state schemes; NSW/ACT levy scheme).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: evidence
    type: list[object]
    description: Provenance for extracted facts (document path/URL, page(s), snippet).
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []

