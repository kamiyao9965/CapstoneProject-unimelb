vertical: private_health
version: 0.1-draft
description: Reusable cross-company extraction schema for Australian private health insurance PDFs covering hospital, extras, generalhealth, and combined products. Designed to capture product identity, insurer/fund metadata, cover type, tier, service categories, covered/restricted/excluded status, waiting periods, limits, benefits, excess/co-payment, conditions, and source/evidence references from PHIS-style summaries and product guides.
product_types:
  - hospital
  - extras
  - generalhealth
  - combined
fields:
  - name: product_name
    type: string
    description: Marketing or display name of the product as shown in the PDF.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: fund_name
    type: string
    description: Consumer-facing fund or brand name.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: company_name
    type: string
    description: Legal entity or company name where provided.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: abn
    type: string
    description: Australian Business Number of the fund/company when stated.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: product_code
    type: string
    description: Internal brochure, product sheet, or document code if present.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: effective_date
    type: string
    description: Date from which the brochure/product information is stated to apply.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: document_type
    type: enum
    description: Document artifact type, such as product sheet, product guide, cover summary, or PHIS-like summary.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: [product_sheet, product_guide, cover_summary, private_health_information_statement, brochure, unknown]
  - name: cover_name
    type: string
    description: Exact cover variant name as used in the document, including tier qualifiers like Basic Plus or High Extras.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: product_type
    type: enum
    description: High-level product category inferred from the document.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: [hospital, extras, generalhealth, combined]
  - name: tier
    type: enum
    description: Market tier or positioning of the product where stated or inferable.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [basic, basic_plus, mid, top, high, value, entry_level, unknown]
  - name: coverage_status
    type: enum
    description: Overall cover status for the product or service group, such as covered, restricted, excluded, partial, or not_applicable.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: [covered, restricted, excluded, partial, not_applicable]
  - name: service_category
    type: string
    description: Normalized service or benefit category label for a row or section.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: service_subcategory
    type: string
    description: Finer-grained service label or item group under a category, such as general dental, major dental, or orthoptics.
    applies_to: [extras, hospital, generalhealth, combined]
    required: false
    values: []
  - name: service_canonical
    type: string
    description: Canonical service concept name mapped from aliases across documents.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: benefit_description
    type: string
    description: Free-text description of the benefit, including any service-specific explanatory notes.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: benefit_status
    type: enum
    description: Indicates whether the specific service is included, restricted, excluded, or conditional.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: [included, restricted, excluded, conditional, not_applicable]
  - name: benefit_amount
    type: number
    description: Dollar amount, percentage, or other numeric benefit value stated for the service.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: benefit_amount_text
    type: string
    description: Raw rendered amount text when the numeric value is mixed with qualifiers such as up to, 70% to $70, or 100% back.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: annual_limit_amount
    type: number
    description: Monetary annual limit for a service or category.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: annual_limit_text
    type: string
    description: Raw annual limit expression including per person, per family, lifetime limit, or no limit.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: lifetime_limit_amount
    type: number
    description: Lifetime limit amount if explicitly stated.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: sub_limit_amount
    type: number
    description: Sub-limit or sub-annual limit amount for a subcategory or item.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: sub_limit_text
    type: string
    description: Raw sub-limit expression and conditions.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: frequency_limit_text
    type: string
    description: Limits on number of claims, services, consultations, or purchases within a period.
    applies_to: [extras, generalhealth, combined]
    required: false
    values: []
  - name: excess_amount
    type: number
    description: Hospital excess amount payable by the member when stated.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: excess_text
    type: string
    description: Raw excess or excess-option wording, including annual/calendar-year application.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: co_payment_amount
    type: number
    description: Member co-payment amount payable in addition to benefits, where stated.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: co_payment_text
    type: string
    description: Raw co-payment wording, including episode-based or provider-based conditions.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: waiting_period_amount
    type: number
    description: Waiting period duration as a numeric value.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: waiting_period_unit
    type: enum
    description: Unit for waiting period duration.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [day, days, week, weeks, month, months, year, years, immediate, none]
  - name: waiting_period_text
    type: string
    description: Raw waiting period wording including service-specific rules and transfer exceptions.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: waiting_period_category
    type: enum
    description: Waiting period classification for a service or rule.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: [general, pre_existing_condition, accident, psychiatric, rehabilitation, palliative_care, optical, dental, ambulance, pharmacy, hospital_other, immediate, none]
  - name: provider_requirement
    type: string
    description: Requirement that services be provided by a recognised, approved, registered, or participating provider.
    applies_to: [extras, hospital, generalhealth, combined]
    required: false
    values: []
  - name: hospital_setting
    type: enum
    description: Setting where the benefit applies.
    applies_to: [hospital, combined]
    required: false
    values: [private_hospital, public_hospital, member_plus_hospital, agreement_hospital, same_day_surgery, any_hospital, not_applicable]
  - name: room_type
    type: enum
    description: Accommodation room type referenced for hospital cover.
    applies_to: [hospital, combined]
    required: false
    values: [private_room, shared_room, private_or_shared, not_applicable]
  - name: medical_service_included
    type: boolean
    description: True if the document says medical services such as choice of doctor, access gap, or prostheses are included in the cover summary.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: ambulance_type
    type: enum
    description: Ambulance coverage type.
    applies_to: [hospital, combined, extras, generalhealth]
    required: false
    values: [emergency, urgent, non_emergency, national, road_only, road_air_sea, not_applicable]
  - name: ambulance_limit_text
    type: string
    description: Raw ambulance limit wording, including no limit, unlimited, or per person/per calendar year wording.
    applies_to: [hospital, combined, extras, generalhealth]
    required: false
    values: []
  - name: accident_cover
    type: boolean
    description: True if the product includes separate accident cover or special accident handling.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: accident_conditions
    type: string
    description: Free-text conditions for accident coverage, including treatment timing, presentation windows, and excluded causes.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: pre_existing_condition_definition
    type: string
    description: Document-specific definition of a pre-existing condition.
    applies_to: [hospital, combined]
    required: false
    values: []
  - name: exclusion_summary
    type: list[object]
    description: List of excluded or not-covered items and the reason or context for exclusion.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: conditions_summary
    type: list[object]
    description: List of material conditions, caveats, and usage rules that affect entitlement or claiming.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: claims_channel
    type: list[object]
    description: Claim submission channels referenced in the document, such as provider terminal, app, portal, email, fax, post, or paper form.
    applies_to: [extras, combined]
    required: false
    values: []
  - name: reference_url
    type: string
    description: URL referenced in the PDF for product details, provider search, or claims information.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: document_date
    type: string
    description: Publication, effective, or current-as-at date if stated.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
  - name: source_page_refs
    type: list[object]
    description: Evidence references to page numbers and short source snippets supporting the extracted schema element or mapping.
    applies_to: [hospital, extras, generalhealth, combined]
    required: true
    values: []
  - name: raw_section_label
    type: string
    description: Original section heading or table label from the PDF that anchors the field.
    applies_to: [hospital, extras, generalhealth, combined]
    required: false
    values: []
