notes:
  - Hospital category names are strongly standardised across Australian funds and should be normalised to canonical names while retaining fund wording in aliases or source text.
  - Extras/general health service names vary more by fund; extraction should preserve both canonical service category and original fund wording.
  - Coverage status for hospital products should support at least Included, Restricted, and Excluded; some PDFs instead use Covered/Not covered or symbols that must be normalised.
  - Waiting periods can exist at product level, category level, service level, sub-limit level, or special-rule level such as accident cover, reduced excess, orthodontics, or hearing aids.
  - Annual limits may reset on either calendar year or financial year; this distinction is important and should be captured explicitly.
  - Benefit structures vary widely: fixed dollar per item, percentage of cost, percentage up to a cap, annual-limit-only network cover, and unlimited ambulance.
  - Some extras products include both per-person and per-family limits simultaneously; the schema supports both.
  - Sub-limits are common for network services, device categories, consultations, group therapy, and product-specific bundles.
  - Many funds require recognised providers, Australian-based suppliers, Medicare eligibility, or ABN-holding providers; these should be modelled as claim conditions or provider notes.
  - No-gap offers are often restricted to selected provider networks and only while annual limits remain available.
  - Accident cover frequently has special timing rules, such as injury occurring after join date, treatment within 7 days, and admission within a fixed number of days.
  - Pre-existing condition wording is mostly stable but fund-specific in phrasing; store the literal definition and, if needed downstream, derive a normalised rule.
  - Hospital accommodation wording differs by fund; capture room entitlements separately for agreement/member-plus private hospitals, public hospitals, and restricted services.
  - Some hospital documents include important cost-management guidance around medical gaps, hospital gaps, prostheses, pharmacy, and public-hospital private-patient choices; these are useful as structured notes even when not strictly benefits.
  - Source evidence should capture enough context to trace extracted rules back to a page, table row, or paragraph in the PDF.
