    aliases: [Acupuncture, Remedial massage, Myotherapy, Chinese herbal consults, Chinese herbal medicine]
  - canonical_name: HealthManagementPrograms
    description: Approved health/healthy lifestyle programs for specific conditions; often require forms and exclude sport/entertainment.
