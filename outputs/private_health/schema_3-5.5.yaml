notes:
  - Coverage status should be normalised from document symbols and words. Ticks or phrases such as included service map to included; restricted, R, or restricted hospital benefits map to restricted; crosses or excluded service map to excluded.
  - Hospital treatment categories should use the canonical hospital_categories list even when the PDF order differs by fund.
  - Extras services should preserve original labels and item codes where shown, while mapping to extras_services canonical names.
  - Waiting periods may apply to new members, upgrades, higher benefits, new services, reduced excesses, or transfer gaps. Capture both the service-level period and the triggering condition.
  - Annual limits may reset by calendar year or financial year depending on the fund. Capture the reset basis explicitly in extras_limit_period or extras_limits.period.
  - Limits can be per person, per family, per child dependant, per eye, per hospital episode, every N years, or lifetime. Store these distinctions rather than collapsing them into one amount.
  - Benefits may be fixed dollar amounts, up-to amounts, percentages, percent capped amounts, full cost, 100% back, no-gap, or unlimited. Preserve raw wording as well as the normalised extras_benefit_type.
  - Network arrangements such as agreement hospitals, Member Plus hospitals, dental networks, optical networks, smile.com.au, and no-gap arrangements should be captured separately from base benefits because they can change out-of-pocket costs.
  - Hospital out-of-pocket costs commonly arise from restricted services, excluded services, non-agreement hospitals, non-agreed hospital services, private rooms in public hospitals, doctor gaps above the MBS, non-listed medical devices, non-PBS pharmacy, or services not covered by Medicare.
  - Extras exclusions commonly include services during waiting periods, overseas treatment or goods, Medicare-payable services, unrecognised providers, family member providers, compensation or third-party claims, old claims, services not charged, non-prescription optical items, and over-the-counter medicines.
  - Source references should be attached at field level for traceability, especially where tables contain multiple benefits, limits and waiting periods on the same page.
